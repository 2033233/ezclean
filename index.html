<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EZ CLEAN - 电脑清灰</title>
<style>
  :root {
    --bg: #000000;
    --card: rgba(28, 28, 30, 0.7);
    --accent: #0A84FF;
    --text-w: #FFFFFF;
    --text-g: #8E8E93;
    --border: rgba(255, 255, 255, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
  body { background-color: var(--bg); color: var(--text-w); padding: 20px 16px 160px; position: relative; min-height: 100vh; overflow-x: hidden; }
  
  .bg-glow { position: fixed; width: 300px; height: 300px; border-radius: 50%; filter: blur(90px); opacity: 0.15; pointer-events: none; z-index: -1; }
  .top-glow { background: var(--accent); top: -100px; left: -50px; }
  .bottom-glow { background: #5E5CE6; bottom: -100px; right: -50px; }

  .glass-effect { background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 12px; position: relative; z-index: 1; }
  .glass-heavy { background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border-top: 1px solid var(--border); }

  .header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
  .brand { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
  .slogan-wrap { display: flex; align-items: center; margin-top: 4px; }
  .slogan { font-size: 12px; color: var(--text-g); letter-spacing: 1px; }
  .indicator { width: 15px; height: 2px; background: var(--accent); margin-left: 6px; border-radius: 2px; }

  .switch-card { padding: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .switch-title { font-size: 15px; font-weight: 600; transition: color 0.3s; }
  .switch-title.active { color: var(--accent); }
  .toggle { appearance: none; width: 50px; height: 30px; background: rgba(255,255,255,0.2); border-radius: 15px; position: relative; outline: none; cursor: pointer; transition: 0.3s; }
  .toggle::after { content: ''; position: absolute; width: 26px; height: 26px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: 0.3s; }
  .toggle:checked { background: var(--accent); }
  .toggle:checked::after { transform: translateX(20px); }

  .service-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
  .card { padding: 16px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer; }
  .card.selected { border-color: var(--accent); background: rgba(10, 132, 255, 0.15); }
  .card-name { font-size: 15px; font-weight: 600; }
  .card-desc { font-size: 11px; color: var(--text-g); }
  .price { font-size: 22px; font-weight: 700; color: var(--accent); }

  .trigger-btn { height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; cursor: pointer; margin-bottom: 15px;}
  .trigger-text { font-size: 15px; font-weight: 500; }
  .arrow { color: var(--text-g); font-size: 16px; }

  /* 订单总结卡片 */
  .order-summary { padding: 16px; margin-bottom: 15px; display: none; }
  .summary-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 10px; }
  .summary-content { font-size: 13px; color: var(--text-w); background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; white-space: pre-wrap; margin-bottom: 12px; font-family: monospace; border: 1px dashed rgba(255,255,255,0.2); line-height: 1.6; }
  .copy-order-btn { width: 100%; background: rgba(10, 132, 255, 0.15); color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; height: 42px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
  .copy-order-btn:active { background: var(--accent); color: #fff; }

  /* 教程说明板 */
  .guide-card { padding: 16px; margin-top: 5px; margin-bottom: 20px; }
  .guide-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 12px; display: flex; align-items: center; }
  .guide-step { font-size: 12px; color: var(--text-g); line-height: 1.6; margin-bottom: 8px; display: flex; }
  .step-num { color: var(--accent); font-weight: 800; margin-right: 8px; }

  .footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .action-area { padding: 10px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
  .pay-btn { background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 0 24px; height: 42px; font-size: 15px; font-weight: 600; cursor: pointer; }

  .modal-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(5px); }
  .modal-mask.show { opacity: 1; visibility: visible; }
  .modal-box { width: 300px; border-radius: 16px; padding: 20px; background: rgba(30,30,30,0.95); border: 1px solid rgba(255,255,255,0.15); }
  .modal-row { display: flex; align-items: center; height: 50px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .modal-label { width: 80px; font-size: 14px; }
  .modal-input { flex: 1; background: transparent; border: none; color: var(--accent); text-align: right; outline: none; }
  .modal-save-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 25px; height: 44px; margin-top: 20px; font-weight: 600; }

  .alert-content { font-size: 13px; color: var(--text-g); margin: 15px 0; line-height: 1.6; }
  .alert-btns { display: flex; margin: 20px -20px -20px; border-top: 1px solid var(--border); }
  .alert-btn { flex: 1; padding: 15px; text-align: center; color: var(--accent); font-weight: 600; cursor: pointer; }
  .alert-btn.cancel { border-right: 1px solid var(--border); color: var(--text-g); font-weight: 400; }
  .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; text-align: center; }
  .toast.show { opacity: 1; visibility: visible; }
</style>
</head>
<body>

  <div class="bg-glow top-glow"></div>
  <div class="bg-glow bottom-glow"></div>

  <div class="header">
    <div>
      <span class="brand">EZ CLEAN</span>
      <div class="slogan-wrap"><span class="slogan">让电脑呼吸顺畅</span><div class="indicator"></div></div>
    </div>
  </div>

  <div class="switch-card glass-effect">
    <div>
      <span class="switch-title" id="invertedText">主板倒置机型</span>
      <span class="switch-desc" style="font-size: 11px; color: var(--text-g); margin-top: 3px; display: block;">如暗影精灵、外星人等复杂拆装机型</span>
    </div>
    <input type="checkbox" class="toggle" id="invertedToggle">
  </div>

  <div class="service-list" id="serviceContainer"></div>

  <div class="trigger-btn glass-effect" id="infoTrigger" onclick="document.getElementById('infoModal').classList.add('show')">
    <div><span class="trigger-text">1. 填写预约资料 (必填)</span></div>
    <div><span class="arrow">&gt;</span></div>
  </div>

  <div class="order-summary glass-effect" id="orderSummary">
    <div class="summary-title">✔️ 预约资料已就绪</div>
    <div class="summary-content" id="summaryContent"></div>
    <button class="copy-order-btn" onclick="copyOrderText()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="margin-right: 6px;"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z" fill="#0A84FF"/></svg>
      一键复制订单
    </button>
  </div>

  <div class="guide-card glass-effect">
    <div class="guide-title">💡 预约操作指南</div>
    <div class="guide-step"><span class="step-num">01</span><span>完善机型资料后，点击右下角【立即预约】。</span></div>
    <div class="guide-step"><span class="step-num">02</span><span>系统将自动复制客服微信号，并为您打开微信。</span></div>
    <div class="guide-step"><span class="step-num">03</span><span>在微信中搜索并添加客服好友。</span></div>
    <div class="guide-step"><span class="step-num">04</span><span>返回本网页，点击【一键复制订单】，再次打开微信发送给客服即可完成预约。</span></div>
  </div>

  <div class="footer glass-heavy">
    <div class="action-area">
      <div style="flex:1">
        <span style="font-size:10px; color:var(--text-g)">预约总计</span><br>
        <span class="amount" id="totalPriceDisplay" style="font-size:24px; font-weight:700">¥39</span>
      </div>
      <button class="pay-btn" onclick="submitOrder()">立即预约</button>
    </div>
  </div>

  <div class="modal-mask" id="infoModal" onclick="if(event.target===this) this.classList.remove('show')">
    <div class="modal-box">
      <div style="text-align:center; font-weight:700; margin-bottom:15px; font-size:18px;">填写预约资料</div>
      <div class="modal-row"><span class="modal-label">称呼</span><input class="modal-input" id="inpName" placeholder="怎么称呼您"></div>
      <div class="modal-row"><span class="modal-label">微信/手机</span><input class="modal-input" id="inpContact" placeholder="方便客服联系"></div>
      <div class="modal-row" style="border:none"><span class="modal-label">电脑型号</span><input class="modal-input" id="inpModel" placeholder="例: 拯救者Y9000P"></div>
      <button class="modal-save-btn" onclick="saveInfo()">生成预约单</button>
    </div>
  </div>

  <div class="modal-mask" id="confirmModal">
    <div class="modal-box">
      <div style="text-align:center; font-weight:700; font-size:16px;">准备跳转微信</div>
      <div class="alert-content">
        系统将为您复制客服微信号并打开微信。<br><br>
        ⚠️ <b>添加好友后，请务必返回本网页点击【一键复制订单】并发送给客服。</b>
      </div>
      <div class="alert-btns">
        <div class="alert-btn cancel" onclick="closeConfirm()">取消</div>
        <div class="alert-btn" onclick="processOrder()">复制微信并跳转</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const state = {
    selectedId: 1,
    isInverted: false,
    isInfoFilled: false,
    userInfo: { name: '', contact: '', model: '' },
    services: [
      { id: 1, name: '基础清灰', desc: '深度除尘 / 涡轮风扇清理', price_normal: 39, price_inverted: 120 },
      { id: 2, name: '清灰 + 自带硅脂', desc: '请自备硅脂交由我们更换', price_normal: 43, price_inverted: 124 },
      { id: 3, name: '清灰 + 品牌硅脂', desc: '含高性能导热硅脂', price_normal: 49, price_inverted: 130 },
      { id: 4, name: '清灰 + 7950相变片', desc: '解决积热神器 / 顶级效能', price_normal: 89, price_inverted: 170 }
    ]
  };

  const container = document.getElementById('serviceContainer');
  const priceDisplay = document.getElementById('totalPriceDisplay');
  const toggle = document.getElementById('invertedToggle');
  const infoModal = document.getElementById('infoModal');
  const confirmModal = document.getElementById('confirmModal');

  function render() {
    container.innerHTML = state.services.map(s => `
      <div class="card glass-effect ${state.selectedId === s.id ? 'selected' : ''}" onclick="selectService(${s.id})">
        <div><span class="card-name">${s.name}</span><br><span class="card-desc">${s.desc}</span></div>
        <div class="price">¥${state.isInverted ? s.price_inverted : s.price_normal}</div>
      </div>
    `).join('');
    
    const curr = state.services.find(s => s.id === state.selectedId);
    priceDisplay.innerText = '¥' + (state.isInverted ? curr.price_inverted : curr.price_normal);
    
    // 如果已经填写了信息，则动态更新订单面板的文本
    if (state.isInfoFilled) {
        updateOrderSummaryText();
    }
  }

  function selectService(id) { state.selectedId = id; render(); }
  toggle.addEventListener('change', (e) => { state.isInverted = e.target.checked; render(); });

  function saveInfo() {
    state.userInfo.name = document.getElementById('inpName').value.trim();
    state.userInfo.contact = document.getElementById('inpContact').value.trim();
    state.userInfo.model = document.getElementById('inpModel').value.trim();
    
    if (!state.userInfo.name || !state.userInfo.contact || !state.userInfo.model) {
      showToast('请完整填写预约资料'); return;
    }
    
    state.isInfoFilled = true;
    infoModal.classList.remove('show');
    
    // 隐藏触发按钮，显示订单卡片
    document.getElementById('infoTrigger').style.display = 'none';
    document.getElementById('orderSummary').style.display = 'block';
    updateOrderSummaryText();
    
    showToast('资料已保存，请点击右下角立即预约');
  }

  function updateOrderSummaryText() {
    const curr = state.services.find(s => s.id === state.selectedId);
    const mode = state.isInverted ? '【主板倒置】' : '【普通机型】';
    const price = state.isInverted ? curr.price_inverted : curr.price_normal;
    const text = `[EZ CLEAN 预约单]\n项目：${curr.name}\n机型：${state.userInfo.model} ${mode}\n称呼：${state.userInfo.name}\n联系：${state.userInfo.contact}\n总额：¥${price}`;
    document.getElementById('summaryContent').innerText = text;
  }

  function copyOrderText() {
    const text = document.getElementById('summaryContent').innerText;
    navigator.clipboard.writeText(text).then(() => {
      showToast('订单已复制！请前往微信粘贴发送给客服');
    });
  }

  function submitOrder() {
    if (!state.isInfoFilled) { 
        showToast('请先填写预约资料'); 
        infoModal.classList.add('show'); 
        return; 
    }
    confirmModal.classList.add('show');
  }

  function closeConfirm() { confirmModal.classList.remove('show'); }

  function processOrder() {
    closeConfirm();
    const wxid = "wxid_gbodfcwsnii822";
    navigator.clipboard.writeText(wxid).then(() => {
      showToast('客服微信号已复制，正在为您打开微信...');
      setTimeout(() => { window.location.href = "weixin://"; }, 1500);
    });
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.innerText = msg; 
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }
  
  // 初始化执行
  render();
</script>
</body>
</html>
